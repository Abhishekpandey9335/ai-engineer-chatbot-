# ===== Server =====
server.port=8080

# ===== PostgreSQL =====
spring.datasource.url=jdbc:postgresql://localhost:5432/ai_engineer_db
spring.datasource.username=postgres
spring.datasource.password=your_password
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== JWT =====
jwt.secret=bWPhwjVAoDwd9V4ZjfwvhQoPEsHREVpddm/PENPSyOA=
jwt.expiration=86400000

# ===== OpenAI =====
# Replace with your actual key from https://platform.openai.com/api-keys
groq.api.key=your_groq_api_key_here
openai.api.url=https://api.groq.com/openai/v1/chat/completions
openai.model=llama-3.3-70b-versatile

# ===== File Storage =====
repo.clone.base-dir=/tmp/ai-agent-repos

# ===== CORS (dev frontend) =====
frontend.url=http://localhost:5173

# ===== Multipart =====
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ===== Async =====
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=10

# ===== Jackson =====
spring.jackson.serialization.write-dates-as-timestamps=false

# ===== Logging =====
logging.level.com.aiagent=DEBUG
logging.level.org.springframework.security=WARN
